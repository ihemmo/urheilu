<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PT">

<title>Personal Trainer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27><text y=%27.9em%27 font-size=%2790%27>&#x1F4AA;</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--card:#141414;--card2:#1a1a1a;--border:#252525;--text:#e8e8e8;--muted:#666;--accent:#ff3e00;--accent2:#ff6b3d;--green:#00e676;--yellow:#ffd600;--blue:#40c4ff;--done-bg:#0d1a0d;--done-text:#2a5a2a}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'IBM Plex Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;padding:0;overflow-x:hidden}
#app{max-width:500px;margin:0 auto;padding:16px;padding-top:max(16px,env(safe-area-inset-top));padding-bottom:max(140px,calc(env(safe-area-inset-bottom)+140px));min-height:100vh}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:70vh;gap:16px}
.title{font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--accent)}
.btn{padding:12px 24px;border-radius:10px;border:2px solid var(--border);background:var(--card);color:var(--text);font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.95)}.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-size:18px;padding:16px 40px}.btn.green{background:var(--green);border-color:var(--green);color:#000}.btn.danger{border-color:#600;color:#f44}.btn.blue{background:var(--blue);border-color:var(--blue);color:#000}.btn.full{width:100%}.btn.sm{padding:8px 14px;font-size:11px}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--accent)}.hdr-title{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--accent)}.hdr-sub{font-size:10px;color:var(--muted);margin-top:2px}.hdr-back{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px 8px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px}.label{font-family:'Oswald',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px;text-transform:uppercase}
.input{width:100%;padding:10px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;outline:none}.input:focus{border-color:var(--accent)}.input-sm{padding:8px 10px;font-size:12px}.input-label{font-size:10px;color:var(--muted);margin-bottom:4px;display:block}.input-group{margin-bottom:10px}.narrow{max-width:55px}
.tabs{display:flex;gap:2px;margin-bottom:14px;background:var(--card);border-radius:8px;padding:3px;border:1px solid var(--border)}.tab{flex:1;padding:8px;text-align:center;font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);cursor:pointer;border-radius:6px;border:none;background:none}.tab.active{background:var(--accent);color:#fff}
.prog-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:10px;cursor:pointer;transition:all .15s;position:relative}.prog-card:active{transform:scale(.98);border-color:var(--accent)}.prog-card-name{font-family:'Oswald',sans-serif;font-size:20px;font-weight:600;color:var(--text);margin-bottom:4px;padding-right:100px}.prog-card-info{font-size:12px;color:var(--muted)}.prog-card-tag{display:inline-block;font-size:10px;padding:3px 8px;border-radius:4px;background:var(--card2);color:var(--muted);border:1px solid var(--border);margin-right:4px;margin-top:6px}.prog-card-actions{position:absolute;top:14px;right:14px;display:flex;gap:6px}
.abtn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:14px;padding:8px 12px;cursor:pointer;font-family:'IBM Plex Mono',monospace;min-width:40px;min-height:40px;display:flex;align-items:center;justify-content:center}.abtn:active{transform:scale(.9);border-color:var(--text)}.abtn.del{color:#800;border-color:#400}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--card);border-radius:6px;margin-bottom:4px;font-size:11px;border:1px solid var(--border)}
.exi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:4px}.exi-name{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;color:var(--text)}.exi-cat{font-size:10px;color:var(--muted);margin-top:2px}.exi-params{display:flex;gap:5px;margin-top:8px;align-items:center;flex-wrap:wrap;font-size:11px;color:var(--muted)}.exi-params label{white-space:nowrap}.exi-actions{display:flex;gap:6px;margin-top:8px;justify-content:flex-end}
.insert-btn{width:100%;padding:6px;margin:2px 0;border:1px dashed var(--border);border-radius:6px;background:transparent;color:var(--muted);font-size:11px;font-family:'IBM Plex Mono',monospace;cursor:pointer;transition:all .15s;text-align:center}.insert-btn:active{border-color:var(--green);color:var(--green);background:rgba(0,230,118,.05)}
.exi-side{display:flex;gap:3px;margin-top:8px;flex-wrap:wrap}.side-btn{padding:6px 10px;border-radius:5px;border:1px solid var(--border);background:var(--card2);color:var(--muted);font-size:11px;cursor:pointer;font-family:'IBM Plex Mono',monospace;min-height:34px}.side-btn.active{border-color:var(--accent);color:var(--accent);background:#1a0800}
.mode-toggle{display:flex;gap:3px;margin-top:6px}.mode-btn{padding:6px 14px;border-radius:5px;border:1px solid var(--border);background:var(--card2);color:var(--muted);font-size:11px;cursor:pointer;font-family:'IBM Plex Mono',monospace;min-height:34px}.mode-btn.active{border-color:var(--blue);color:var(--blue);background:#001a2a}
.lib-cat{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;color:var(--accent);padding:10px 0 6px;border-top:1px solid var(--border);margin-top:6px;letter-spacing:1px;text-transform:uppercase;cursor:pointer}.lib-cat:first-child{border-top:none;margin-top:0}
.lib-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;margin:4px 0;border-radius:8px;background:var(--card2);border:1px solid var(--border);font-size:13px}.lib-add{color:var(--green);font-size:28px;font-weight:700;padding:0;border:2px solid var(--green);border-radius:10px;background:rgba(0,230,118,.08);transition:all .12s;width:56px;height:56px;min-width:56px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:'Oswald',sans-serif}.lib-add:active{transform:scale(.85);background:rgba(0,230,118,.3)}
.staging{background:var(--card);border:2px solid var(--green);border-radius:12px;padding:16px;margin:8px 0 12px;animation:stageIn .2s ease}
@keyframes stageIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.staging-title{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;color:var(--green);margin-bottom:8px}
.staging-row{display:flex;gap:4px;margin:6px 0;align-items:center;flex-wrap:wrap;font-size:10px;color:var(--muted)}
.staging-row label{white-space:nowrap}
.pos-select{display:flex;align-items:center;gap:6px;margin:8px 0;font-size:11px;color:var(--muted);flex-wrap:wrap}
.pos-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:var(--card2);color:var(--muted);font-size:10px;cursor:pointer;font-family:'IBM Plex Mono',monospace}.pos-btn.active{border-color:var(--green);color:var(--green);background:#001a0d}
.prep-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:13px}.prep-weight{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;color:var(--blue)}.prep-count{font-size:11px;color:var(--muted)}
.w-progress{display:flex;gap:3px;margin:0 0 8px}.w-dot{flex:1;height:4px;border-radius:2px;background:var(--card2)}.w-dot.done{background:var(--green)}.w-dot.current{background:var(--accent)}
.w-total{text-align:center;font-size:11px;color:var(--muted);margin-bottom:16px;font-variant-numeric:tabular-nums}
.w-phase{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;text-align:center;margin-bottom:4px}.w-phase.work{color:var(--accent)}.w-phase.rest{color:var(--green)}
.w-name{font-family:'Oswald',sans-serif;font-size:34px;font-weight:700;color:#fff;text-align:center;margin:8px 0 4px;line-height:1.1}.w-detail{font-size:11px;color:var(--muted);text-align:center;margin-bottom:4px}.w-weight{font-size:13px;color:var(--blue);text-align:center;margin-bottom:12px;font-weight:600}
.w-ring{width:200px;height:200px;margin:0 auto;position:relative;display:flex;align-items:center;justify-content:center}.w-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}.w-ring-time{font-family:'Oswald',sans-serif;font-size:64px;font-weight:700;font-variant-numeric:tabular-nums;z-index:1}.w-ring-time.warn{color:var(--yellow)}
.w-timer-rest{font-family:'Oswald',sans-serif;font-size:72px;font-weight:700;text-align:center;color:var(--green);font-variant-numeric:tabular-nums;margin:20px 0}
.w-next{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-top:16px;text-align:center}.w-next-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}.w-next-name{font-family:'Oswald',sans-serif;font-size:18px;color:var(--text)}.w-next-weight{font-size:11px;color:var(--blue);margin-top:2px}
.w-reps{text-align:center;margin:20px 0}.w-reps-count{font-family:'Oswald',sans-serif;font-size:80px;font-weight:700;color:var(--accent)}.w-reps-label{font-size:12px;color:var(--muted);margin-top:4px}
.stat-row{display:flex;gap:8px;margin-bottom:12px}.stat-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}.stat-val{font-family:'Oswald',sans-serif;font-size:24px;font-weight:600;color:var(--accent)}.stat-label{font-size:9px;color:var(--muted);margin-top:2px}
.bottom{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,var(--bg) 25%);padding:16px 16px max(16px,env(safe-area-inset-bottom));display:flex;justify-content:center;gap:10px;z-index:20}
#lockscreen{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:100;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;-webkit-text-size-adjust:none;pointer-events:auto}
.lock-info{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;opacity:.3}
.lock-time{font-family:'Oswald',sans-serif;font-size:48px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums}
.lock-name{font-size:11px;color:#888;margin-top:4px;max-width:250px}
.lock-mode{font-size:10px;color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:2px}
.lock-slider{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);width:280px;text-align:center}
.lock-track{width:100%;height:56px;border-radius:28px;background:#111;border:1px solid #333;position:relative;overflow:hidden}
.lock-thumb{position:absolute;left:4px;top:4px;width:48px;height:48px;border-radius:24px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;touch-action:none;cursor:grab;transition:left 0.1s;z-index:2}
.lock-thumb.dragging{transition:none}
.lock-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#444;pointer-events:none;z-index:1}
.lock-hint{font-size:10px;color:#333;margin-top:12px}

/* RUNNING */

.phase-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:6px;position:relative}
.phase-name{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;color:var(--text)}.phase-info{font-size:10px;color:var(--muted);margin-top:2px}.phase-pace{font-size:11px;color:var(--blue);margin-top:2px}
.phase-actions{display:flex;gap:6px;margin-top:6px;justify-content:flex-end}
.repeat-card{background:#0d1520;border:2px solid var(--blue);border-radius:12px;padding:12px;margin:8px 0}
.repeat-label{font-family:'Oswald',sans-serif;font-size:12px;color:var(--blue);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.phase-active{border-color:var(--accent);background:#1a0800}
.phase-done{border-color:var(--green);opacity:.6}
.run-phase-indicator{display:flex;gap:3px;margin:0 0 8px;flex-wrap:wrap}.run-phase-dot{width:8px;height:8px;border-radius:4px;background:var(--card2)}.run-phase-dot.done{background:var(--green)}.run-phase-dot.current{background:var(--accent)}.run-phase-dot.rest{background:var(--blue)}
.target-pace-display{font-family:'Oswald',sans-serif;font-size:16px;color:var(--yellow);text-align:center;margin:4px 0}
.gps-status{padding:16px;border-radius:12px;text-align:center;margin:12px 0;font-size:13px}
.gps-status.ok{background:#0d1a0d;border:1px solid var(--green);color:var(--green)}
.gps-status.waiting{background:#1a1a00;border:1px solid var(--yellow);color:var(--yellow)}
.gps-status.error{background:#1a0d0d;border:1px solid #f44;color:#f44}

.run-stat{text-align:center;margin:8px 0}.run-stat-val{font-family:'Oswald',sans-serif;font-size:56px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;line-height:1}.run-stat-unit{font-size:12px;color:var(--muted);margin-top:2px}.run-stat-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:4px}
.run-stat-sm .run-stat-val{font-size:32px}
.run-stats-row{display:flex;gap:8px;margin:12px 0}.run-stats-row>div{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 8px}
.run-prog{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:10px;cursor:pointer;transition:all .15s}.run-prog:active{transform:scale(.98);border-color:var(--accent)}.run-prog-name{font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;color:var(--text)}.run-prog-desc{font-size:11px;color:var(--muted);margin-top:4px}.run-prog-tag{display:inline-block;font-size:9px;padding:2px 8px;border-radius:4px;background:var(--card2);color:var(--blue);border:1px solid var(--blue);margin-top:6px}
.run-prog-actions{display:flex;gap:6px;margin-top:8px;justify-content:flex-end}
.mode-card{background:var(--card);border:2px solid var(--border);border-radius:16px;padding:24px 20px;cursor:pointer;text-align:center;transition:all .15s;flex:1}.mode-card:active{transform:scale(.96);border-color:var(--accent)}.mode-card-icon{font-size:48px;margin-bottom:8px}.mode-card-title{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:2px}
.cooper-bar{width:100%;height:8px;border-radius:4px;background:var(--card2);margin:8px 0;overflow:hidden}.cooper-fill{height:100%;border-radius:4px;transition:width .5s}
.gps-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}.gps-dot.ok{background:var(--green)}.gps-dot.wait{background:var(--yellow);animation:gpsBlink 1s infinite}
@keyframes gpsBlink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div id="lockscreen">
<div class="lock-info"><div class="lock-mode" id="lock-mode"></div><div class="lock-time" id="lock-time"></div><div class="lock-name" id="lock-name"></div></div>
<div class="lock-slider"><div class="lock-track"><div class="lock-label">Liu&apos;uta avataksesi &#x279C;</div><div class="lock-thumb" id="lock-thumb">&#x1F513;</div></div><div class="lock-hint">Laske kirkkaus minimiin</div></div>
</div>
<div id="app"></div>
<div class="bottom" id="btm" style="display:none"></div>
<script>
(function(){
'use strict';
var mem={};
var store={get:function(k){try{var v=localStorage.getItem(k);if(v!==null)return v;}catch(e){}return mem[k]||null;},set:function(k,v){mem[k]=v;try{localStorage.setItem(k,v);}catch(e){}},del:function(k){delete mem[k];try{localStorage.removeItem(k);}catch(e){}}};

var audioCtx=null;
function initAudio(){if(audioCtx)return;try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();var b=audioCtx.createBuffer(1,1,22050);var s=audioCtx.createBufferSource();s.buffer=b;s.connect(audioCtx.destination);s.start(0);}catch(e){}}
function beep(f,d){if(!audioCtx)return;try{var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=f;g.gain.value=0.3;o.start();o.stop(audioCtx.currentTime+d/1000);}catch(e){}}
function shortBeep(){beep(800,150);}function longBeep(){beep(1200,400);}
function plingOk(){if(!audioCtx)return;try{var t=audioCtx.currentTime;var o1=audioCtx.createOscillator(),o2=audioCtx.createOscillator(),g=audioCtx.createGain();o1.connect(g);o2.connect(g);g.connect(audioCtx.destination);o1.frequency.value=880;o2.frequency.value=1320;g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.4);o1.start(t);o1.stop(t+0.2);o2.start(t+0.15);o2.stop(t+0.4);}catch(e){}}
function beepSlow(){if(!audioCtx)return;try{var t=audioCtx.currentTime;var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.setValueAtTime(600,t);o.frequency.linearRampToValueAtTime(400,t+0.25);g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.3);o.start(t);o.stop(t+0.3);}catch(e){}}
function beepFast(){if(!audioCtx)return;try{var t=audioCtx.currentTime;var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=1000;g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.15);o.start(t);o.stop(t+0.15);}catch(e){}}

/* Fast rolling speed: uses last N seconds of GPS for quick reaction */
var SPEED_WINDOW=8;
function recentSpeed(){
  var pts=R.positions;if(pts.length<2)return 0;
  var now=Date.now(),cutoff=now-SPEED_WINDOW*1000;
  var recent=[];for(var i=pts.length-1;i>=0;i--){if(pts[i].time>=cutoff)recent.unshift(pts[i]);else break;}
  if(recent.length<2)return 0;
  var first=recent[0],last=recent[recent.length-1];
  var dt=(last.time-first.time)/1000;
  if(dt<2)return 0;
  var dd=haversine(first.lat,first.lon,last.lat,last.lon);
  return dd/dt;
}
function recentPaceMinKm(){var s=recentSpeed();return s>0.3?(1000/s/60):0;}

/* Pace feedback state */
var paceCheckLast=0,paceWasOk=false;
var fiVoice=null;
function findVoice(){try{var v=speechSynthesis.getVoices();for(var i=0;i<v.length;i++){if(v[i].lang&&v[i].lang.indexOf('fi')===0){fiVoice=v[i];return;}}}catch(e){}}
var lang=store.get('pt4_lang')||'fi';
function setLang(l){lang=l;store.set('pt4_lang',l);render();}
function speak(text){try{speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(text);u.lang=lang==='fi'?'fi-FI':'en-US';u.rate=1.0;u.pitch=0.7;u.volume=1.0;if(lang==='fi'&&fiVoice)u.voice=fiVoice;speechSynthesis.speak(u);}catch(e){}}

}

function pad2(n){return n<10?'0'+n:''+n;}
function uid(){return 'p_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);}
function fD(ms){var s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);if(h>0)return h+':'+pad2(m%60)+':'+pad2(s%60);return m+':'+pad2(s%60);}
function fT(d){return pad2(d.getHours())+':'+pad2(d.getMinutes());}
function fDF(d){return d.getDate()+'.'+(d.getMonth()+1)+'.'+d.getFullYear();}
function esc(s){if(!s)return '';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function equipText(ex){var p=[];if(ex.weight)p.push(ex.weight+' kg');if(ex.kpl>1)p.push(ex.kpl+' kpl');else if(ex.kpl===1)p.push('1 kpl');return p.join(' \u00d7 ');}
function elapsedTime(){if(W.paused)return W.pausedAt-W.totalStart-W.pauseTotal;return Date.now()-W.totalStart-W.pauseTotal;}
function speakExercise(ex,sec){var t=ex.name+'! ';if(ex.weight){t+=ex.weight+' '+T().kg+'! ';}if(ex.kpl>1)t+=ex.kpl+' '+T().kpl+'! ';if(ex.modeType==='reps')t+=(ex.reps||10)+' '+T().reps+'! '+T().doIt;else t+=sec+' '+T().sec+'! '+rndMotivate();bark(t);}
function getEquipmentList(exercises){var g={};for(var i=0;i<exercises.length;i++){var ex=exercises[i];if(!ex.weight||ex.weight<=0)continue;var c=ex.cat||'Muu';var k=c+'|'+ex.weight+'|'+(ex.kpl||1);if(!g[k])g[k]={cat:c,weight:ex.weight,kpl:ex.kpl||1,names:[]};if(g[k].names.indexOf(ex.name)<0)g[k].names.push(ex.name);}var l=[];for(var j in g)l.push(g[j]);l.sort(function(a,b){return a.cat<b.cat?-1:a.cat>b.cat?1:a.weight-b.weight;});return l;}

/* BACKUP / RESTORE */
function exportBackup(){
  try{
    var data={version:2,date:new Date().toISOString(),programs:getPrograms()||[],library:getLib()||[],history:getHistory(),lang:lang,runPrograms:getRunPrograms()||[],runHistory:getRunHistory()};
    var json=JSON.stringify(data,null,2);
    var blob=new Blob([json],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;a.download='pt-backup-'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }catch(e){alert('Backup failed: '+e.message);}
}
function importBackup(file){
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      if(!data.programs||!Array.isArray(data.programs)){alert(lang==='fi'?'Virheellinen tiedosto':'Invalid file');return;}
      var msg=lang==='fi'?'Palautetaan varmuuskopio?\n\nOhjelmat: '+data.programs.length+'\nKirjasto: '+(data.library?data.library.length:0)+' ryhm\u00e4\u00e4\nHistoria: '+(data.history?data.history.length:0)+' treeni\u00e4\n\nT\u00e4m\u00e4 korvaa nykyisen datan!':'Restore backup?\n\nPrograms: '+data.programs.length+'\nLibrary: '+(data.library?data.library.length:0)+' categories\nHistory: '+(data.history?data.history.length:0)+' workouts\n\nThis will replace current data!';
      if(!confirm(msg))return;
      savePrograms(data.programs);
      if(data.library&&data.library.length)saveLib(data.library);
      if(data.history&&data.history.length)store.set('pt4_hist',JSON.stringify(data.history));
      if(data.lang)setLang(data.lang);
      if(data.runPrograms&&data.runPrograms.length)saveRunPrograms(data.runPrograms);

/* GPS */
function haversine(lat1,lon1,lat2,lon2){
  var RR=6371000,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return RR*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
var gpsBuf=[],gpsSmoothed=null,gpsLastAccepted=null;
var GPS_BUF_SIZE=6,GPS_MIN_MOVE=3,GPS_MAX_ACC=25,GPS_SETTLE_SEC=4;

function weightedCenter(buf){
  /* Accuracy-weighted centroid: weight = 1/acc^2 */
  var wLat=0,wLon=0,wSum=0;
  for(var i=0;i<buf.length;i++){
    var w=1/(buf[i].acc*buf[i].acc);
    wLat+=buf[i].lat*w;wLon+=buf[i].lon*w;wSum+=w;
  }
  if(wSum===0)return null;
  return{lat:wLat/wSum,lon:wLon/wSum};
}

function addGPSPoint(pos){
  if(R.phase!=='active')return;
  var p={lat:pos.coords.latitude,lon:pos.coords.longitude,acc:pos.coords.accuracy,time:Date.now()};
  /* Accept wider range for averaging, reject only very bad */
  if(p.acc>GPS_MAX_ACC)return;
  /* Ignore settling period */
  var elapsed=(p.time-R.startTime-R.pauseTotal)/1000;
  if(elapsed<GPS_SETTLE_SEC)return;
  /* Add to rolling buffer */
  gpsBuf.push(p);
  if(gpsBuf.length>GPS_BUF_SIZE)gpsBuf.shift();
  /* Need at least 3 points to average */
  if(gpsBuf.length<3)return;
  /* Compute smoothed position */
  var sm=weightedCenter(gpsBuf);
  if(!sm)return;
  gpsSmoothed=sm;
  /* Compare to last accepted smoothed position */
  if(!gpsLastAccepted){gpsLastAccepted={lat:sm.lat,lon:sm.lon,time:p.time};return;}
  var dt=(p.time-gpsLastAccepted.time)/1000;
  if(dt<1.5)return;
  var dd=haversine(gpsLastAccepted.lat,gpsLastAccepted.lon,sm.lat,sm.lon);
  /* Max speed filter: 12 m/s = 43 km/h */
  if(dt>0&&dd/dt>12)return;
  /* Min movement: must exceed noise floor */
  if(dd<GPS_MIN_MOVE)return;
  /* Min speed: 0.4 m/s = 1.4 km/h, must be intentional movement */
  if(dt>0&&dd/dt<0.4)return;
  /* Accept this movement */
  R.distance+=dd;
  gpsLastAccepted={lat:sm.lat,lon:sm.lon,time:p.time};
  R.positions.push({lat:sm.lat,lon:sm.lon,acc:p.acc,time:p.time});
}

  return true;
}

/* Running engine */
function runElapsed(){if(R.phase==='paused')return R.pausedAt-R.startTime-R.pauseTotal;if(R.phase==='finished')return R.finishTime-R.startTime-R.pauseTotal;return Date.now()-R.startTime-R.pauseTotal;}
function runPace(){var el=runElapsed()/1000;return el>3?R.distance/el:0;}
function runPaceMinKm(){var p=runPace();return p>0.3?(1000/p/60):0;}
function runProjectedCooper(){var el=runElapsed()/1000;return el>10?R.distance/el*720:0;}

/* Smart pacing guidance for Cooper target / timed_distance */
var lastPaceGuidance=0; /* track if we told user to speed up/slow, to give follow-up */
function cooperPaceGuidance(elSec,distM,targetDist,totalTime){
  if(!targetDist||targetDist<=0)return '';
  if(elSec<15)return '';
  var remTime=Math.max(1,totalTime-elSec);
  var remDist=targetDist-distM;
  if(remDist<=0)return T().paceAhead;
  var requiredPace=remDist/remTime; /* m/s needed */
  var currentPace=runPace(); /* m/s current */
  if(currentPace<0.3)return '';
  var diff=(requiredPace-currentPace)/requiredPace; /* positive = need faster, negative = can slow */
  var msg='';var reqMinKm=requiredPace>0.3?(1000/requiredPace/60):0;
  if(diff>0.20){msg=T().paceSpeedUpBig;lastPaceGuidance=2;}
  else if(diff>0.10){msg=T().paceSpeedUpMed;lastPaceGuidance=2;}
  else if(diff>0.03){msg=T().paceSpeedUpSmall;lastPaceGuidance=1;}
  else if(diff>0.01){msg=T().paceSpeedUpTiny;lastPaceGuidance=1;}
  else if(diff>-0.03){msg=T().paceOnTarget;lastPaceGuidance=0;}
  else if(diff>-0.10){msg=T().paceSlowTiny;lastPaceGuidance=-1;}
  else if(diff>-0.20){msg=T().paceSlowSmall;lastPaceGuidance=-1;}
  else{msg=T().paceSlowMed;lastPaceGuidance=-2;}
  return msg;
}
function fDist(m){return m>=1000?(m/1000).toFixed(2)+' km':Math.round(m)+' m';}
function fPace(minkm){if(minkm<=0)return '--:--';var m=Math.floor(minkm);var s=Math.round((minkm-m)*60);return m+':'+pad2(s);}

function flattenPhases(prog){
  if(prog.type!=='interval'||!prog.phases||!prog.phases.length)return[];
  var flat=[];
  var main=prog.phases;
  var rf=prog.repeatFrom||0,rt=prog.repeatTo||0,rc=prog.repeatCount||1;
  /* Add warmup (phase 0 if type warmup, or phases before repeatFrom) */
  for(var i=0;i<main.length;i++){
    if(i<rf){flat.push({name:main[i].name,dur:main[i].dur,pace:main[i].pace||0,type:main[i].type||'jog',round:0});}
  }
  /* Repeat block */
  for(var r=1;r<=rc;r++){
    for(var j=rf;j<=rt&&j<main.length;j++){
      flat.push({name:main[j].name,dur:main[j].dur,pace:main[j].pace||0,type:main[j].type||'jog',round:r});
    }
  }
  /* Phases after repeat block */
  for(var k=rt+1;k<main.length;k++){
    flat.push({name:main[k].name,dur:main[k].dur,pace:main[k].pace||0,type:main[k].type||'jog',round:0});
  }
  /* Cooldown */
  if(prog.cooldown&&prog.cooldown.dur>0){
    flat.push({name:prog.cooldown.name||'Cooldown',dur:prog.cooldown.dur,pace:prog.cooldown.pace||0,type:'cooldown',round:0});
  }
  return flat;
}
function intervalTotalTime(prog){
  var f=flattenPhases(prog),t=0;for(var i=0;i<f.length;i++)t+=f[i].dur;return t;
}

function runTick(){
  if(R.phase!=='active')return;
  var elSec=Math.floor(runElapsed()/1000);
  var prog=R.prog;
  if(prog.type==='cooper'&&elSec>=720){finishRun();return;}
  if(prog.type==='time'&&prog.targetTime>0&&elSec>=prog.targetTime){finishRun();return;}
  if(prog.type==='distance'&&prog.targetDistance>0&&R.distance>=prog.targetDistance){finishRun();return;}
  if(prog.type==='timed_distance'&&prog.targetTime>0&&elSec>=prog.targetTime){finishRun();return;}
  if(prog.type==='timed_distance'&&prog.targetDistance>0&&R.distance>=prog.targetDistance){finishRun();return;}
  /* Interval phase management */
  if(prog.type==='interval'&&R.flatPhases.length>0){
    R.phaseTimeLeft--;
    if(R.phaseTimeLeft<=5&&R.phaseTimeLeft>0){shortBeep();}
    if(R.phaseTimeLeft<=0){
      R.phaseIdx++;
      if(R.phaseIdx>=R.flatPhases.length){finishRun();return;}
      var np=R.flatPhases[R.phaseIdx];R.phaseTimeLeft=np.dur;
      longBeep();var pmsg=T().runPhaseChange+' '+np.name+'!';
      if(np.dur>=60)pmsg+=' '+Math.floor(np.dur/60)+' '+T().runMin+'.';else pmsg+=' '+np.dur+' '+T().runSec+'.';
      if(np.pace>0)pmsg+=' '+T().runTargetPace+' '+fPace(np.pace)+'.';
      bark(pmsg);
    }
    /* Interval pace feedback every 15s */
    if(R.phaseTimeLeft>0&&R.phaseTimeLeft%15===0){
      var cp=R.flatPhases[R.phaseIdx];
      if(cp.pace>0){var curPace=runPaceMinKm();
        if(curPace>0){if(curPace>cp.pace+0.3)bark(T().runFaster);else if(curPace<cp.pace-0.3)bark(T().runSlower);else if(R.phaseTimeLeft%30===0)bark(T().runOnPace);}
      }else if(elSec>0&&R.phaseTimeLeft%30===0&&elSec!==R.lastSpeechAt){R.lastSpeechAt=elSec;runSpeech(elSec);}
    }
  }else{
  if(elSec>0&&elSec%30===0&&elSec!==R.lastSpeechAt){R.lastSpeechAt=elSec;runSpeech(elSec);}}
  if(prog.type==='cooper'||prog.type==='time'||prog.type==='timed_distance'){
    var target=prog.type==='cooper'?720:(prog.targetTime||9999);
    var rem=target-elSec;
    if(rem===60)bark(T().runOneMinLeft);
    else if(rem===10)bark(T().runTenSec);
    else if(rem<=5&&rem>0){shortBeep();bark(T().cd[rem]||'');}
  }
  /* Real-time pace audio feedback every 5s for target-based runs */
  var hasTarget=(prog.type==='cooper'&&prog.targetDistance>0)||(prog.type==='timed_distance'&&prog.targetDistance>0&&prog.targetTime>0);
  if(hasTarget&&elSec>10&&elSec%5===0&&elSec!==paceCheckLast){
    paceCheckLast=elSec;
    var rSpd=recentSpeed();
    if(rSpd>0.3){
      var totalT=prog.type==='cooper'?720:(prog.targetTime||999);
      var remT=Math.max(1,totalT-elSec);
      var remD=prog.targetDistance-R.distance;
      if(remD<=0){/* already reached target */if(!paceWasOk){plingOk();paceWasOk=true;}}
      else{
        var reqSpd=remD/remT;
        var ratio=rSpd/reqSpd;
        if(ratio>=0.95&&ratio<=1.15){/* on target */if(!paceWasOk){plingOk();}paceWasOk=true;}
        else if(ratio<0.95){/* too slow */beepSlow();paceWasOk=false;}
        else{/* too fast, saving energy */beepFast();paceWasOk=false;}
      }
    }
  }
  render();updateLockInfo();
}

function runSpeech(elSec){
  var mins=Math.floor(elSec/60),secs=elSec%60,distM=Math.round(R.distance),pace=runPace(),pMK=runPaceMinKm();
  var prog=R.prog,msg='';
  msg+=mins+' '+T().runMin+(secs>0?', '+secs+' '+T().runSec:'')+'. ';
  msg+=distM+' '+T().runMeters+'. ';
  if(pMK>0)msg+=T().runPace+' '+fPace(pMK)+' '+T().runPerKm+'. ';
  /* Cooper with target: smart pacing guidance */
  if(prog.type==='cooper'&&prog.targetDistance>0){
    msg+=T().runProjected+' '+Math.round(runProjectedCooper())+' '+T().runMeters+'. ';
    msg+=cooperPaceGuidance(elSec,distM,prog.targetDistance,720);
  }
  /* Cooper without target: just projection + general pace trend */
  else if(prog.type==='cooper'){
    msg+=T().runProjected+' '+Math.round(runProjectedCooper())+' '+T().runMeters+'. ';
    if(R.prevPace>0&&pace>0){var d=(pace-R.prevPace)/R.prevPace;if(d>0.05)msg+=rndFrom(T().runPaceUp);else if(d<-0.05)msg+=rndFrom(T().runPaceDown);else msg+=rndFrom(T().runPaceSteady);}
  }
  /* Timed distance: pacing guidance towards both targets */
  else if(prog.type==='timed_distance'&&prog.targetDistance>0&&prog.targetTime>0){
    msg+=cooperPaceGuidance(elSec,distM,prog.targetDistance,prog.targetTime);
  }
  /* Other types: general pace trend */
  else{
    if(R.prevPace>0&&pace>0){var d2=(pace-R.prevPace)/R.prevPace;if(d2>0.05)msg+=rndFrom(T().runPaceUp);else if(d2<-0.05)msg+=rndFrom(T().runPaceDown);else msg+=rndFrom(T().runPaceSteady);}
  }
  R.prevPace=pace;bark(msg);
}

function pauseRun(){if(R.phase!=='active')return;R.phase='paused';R.pausedAt=Date.now();clearAllTimers();stopGPS();bark(T().pause);render();}

  if(!prog||!prog.exercises.length)return;
  W={phase:'active',progName:prog.name,exercises:prog.exercises,workSec:prog.workSec||45,restSec:prog.restSec||10,exIdx:0,mode:'countdown',timeLeft:5,totalStart:Date.now(),exDurs:[],paused:false,pausedAt:0,pauseTotal:0};
  view='workout';bark(T().start);clearAllTimers();timer=setInterval(tick,1000);render();lockScreen();}

function tick(){
  W.timeLeft=W.timeLeft-1;var ex=W.exercises[W.exIdx];var exSec=(ex.sec&&ex.sec>0)?ex.sec:W.workSec;
  if(W.mode==='countdown'){if(W.timeLeft<=0){W.mode='work';if(ex.modeType==='reps'){clearAllTimers();speakExercise(ex,0);longBeep();}else{W.timeLeft=exSec;speakExercise(ex,exSec);longBeep();}}else if(W.timeLeft<=3)shortBeep();}
  else if(W.mode==='work'){if(W.timeLeft<=0){advanceExercise();}else if(W.timeLeft<=5){shortBeep();bark(T().cd[W.timeLeft]||'');}else if(W.timeLeft===Math.floor(exSec/2)&&exSec>15){bark(rndMotivate());}}
  else if(W.mode==='rest'){if(W.timeLeft<=0){W.exIdx++;ex=W.exercises[W.exIdx];exSec=(ex.sec&&ex.sec>0)?ex.sec:W.workSec;W.mode='work';if(ex.modeType==='reps'){clearAllTimers();speakExercise(ex,0);longBeep();}else{W.timeLeft=exSec;longBeep();speakExercise(ex,exSec);}}else if(W.timeLeft<=3)shortBeep();}
  render();updateLockInfo();}

function advanceExercise(){
  var ex=W.exercises[W.exIdx];var exSec=(ex.sec&&ex.sec>0)?ex.sec:W.workSec;
  W.exDurs.push({name:ex.name,dur:exSec*1000});
  if(W.exIdx>=W.exercises.length-1){finishWorkout();return;}
  W.mode='rest';W.timeLeft=W.restSec;longBeep();
  if(!timer)timer=setInterval(tick,1000);
  var next=W.exercises[W.exIdx+1];var msg=rndFrom(T().rest)+' '+T().next+' '+next.name+'!';if(next.weight)msg+=' '+next.weight+' '+T().kg+'!';bark(msg);render();}

function completeReps(){if(W.mode!=='work'||W.exercises[W.exIdx].modeType!=='reps')return;advanceExercise();}

function finishWorkout(){clearAllTimers();W.phase='finished';W.paused=false;releaseWakeLock();unlockScreen();var dur=Date.now()-W.totalStart-W.pauseTotal;var mins=Math.floor(dur/60000);var msg=rndFrom(T().finish).replace('MIN',''+mins);bark(msg);longBeep();setTimeout(function(){longBeep();},300);saveHistory({date:new Date().toISOString(),dur:dur,progName:W.progName,count:W.exercises.length});render();}
function skipEx(){var ex=W.exercises[W.exIdx];var exSec=(ex.sec&&ex.sec>0)?ex.sec:W.workSec;if(W.mode==='work'){W.exDurs.push({name:ex.name,dur:0});if(W.exIdx>=W.exercises.length-1){finishWorkout();return;}W.mode='rest';W.timeLeft=W.restSec;if(!timer)timer=setInterval(tick,1000);bark(T().skip+' '+W.exercises[W.exIdx+1].name+'! '+T().prepare);}else if(W.mode==='rest'){W.exIdx++;var ex2=W.exercises[W.exIdx];var s2=(ex2.sec&&ex2.sec>0)?ex2.sec:W.workSec;W.mode='work';if(ex2.modeType==='reps'){clearAllTimers();speakExercise(ex2,0);longBeep();}else{W.timeLeft=s2;longBeep();speakExercise(ex2,s2);}}render();}

      h+='<div style="display:flex;gap:4px;align-items:center;margin-bottom:6px"><input class="input input-sm" value="'+esc(ph.name)+'" data-bind="phname" data-idx="'+pi+'" style="flex:1" placeholder="'+(lang==='fi'?'Nimi':'Name')+'"></div>';
      h+='<div style="display:flex;gap:4px;align-items:center"><label style="font-size:10px;color:var(--muted);white-space:nowrap">'+(lang==='fi'?'Kesto (min:sek)':'Duration')+'</label><input class="input input-sm narrow" type="number" inputmode="numeric" value="'+Math.floor(ph.dur/60)+'" data-bind="phmin" data-idx="'+pi+'" placeholder="0" style="max-width:45px">:<input class="input input-sm narrow" type="number" inputmode="numeric" value="'+(ph.dur%60||'')+'" data-bind="phsec" data-idx="'+pi+'" placeholder="0" style="max-width:45px">';
      h+='<label style="font-size:10px;color:var(--muted);white-space:nowrap;margin-left:8px">min/km</label><input class="input input-sm narrow" type="number" inputmode="decimal" step="0.1" value="'+(ph.pace||'')+'" data-bind="phpace" data-idx="'+pi+'" placeholder="0" style="max-width:55px"></div>';
      h+='<div style="display:flex;gap:2px;margin-top:4px;flex-wrap:wrap">';
      var types=[['warmup','\u{1F525} '+(lang==='fi'?'L\u00e4mmittely':'Warmup')],['jog','\u{1F6B6} '+(lang==='fi'?'H\u00f6lkk\u00e4':'Jog')],['tempo','\u26A1 Tempo'],['sprint','\u{1F3C3} '+(lang==='fi'?'Spurtti':'Sprint')]];
      for(var ti=0;ti<types.length;ti++){h+='<button class="side-btn'+((ph.type||'jog')===types[ti][0]?' active':'')+'" data-action="setphtype" data-val="'+pi+'" data-val2="'+types[ti][0]+'" style="font-size:9px;padding:3px 8px">'+types[ti][1]+'</button>';}
      h+='</div>';
      h+='<div class="phase-actions">';
      if(pi>0)h+='<button class="abtn" data-action="moveph" data-val="'+pi+'" data-val2="-1">\u2191</button>';
      if(pi<rp.phases.length-1)h+='<button class="abtn" data-action="moveph" data-val="'+pi+'" data-val2="1">\u2193</button>';
      h+='<button class="abtn del" data-action="remph" data-val="'+pi+'">\u2715</button></div></div>';
      if(pi===rp.repeatTo&&rp.repeatCount>1)h+='</div>';
    }
    h+='<button class="btn full sm" data-action="addph" style="margin:6px 0;border-style:dashed">+ '+(lang==='fi'?'Lis\u00e4\u00e4 vaihe':'Add phase')+'</button>';
    /* Repeat settings */
    if(rp.phases.length>=2){
      h+='<div class="card" style="border-color:var(--blue)"><div class="label">\u{1F501} '+(lang==='fi'?'Toisto':'Repeat')+'</div>';
      h+='<div style="display:flex;gap:6px;align-items:center;font-size:11px;color:var(--muted)">';
      h+='<label>'+(lang==='fi'?'Alku':'From')+'</label><input class="input input-sm narrow" type="number" inputmode="numeric" value="'+(rp.repeatFrom+1)+'" data-bind="repeatfrom" min="1" max="'+rp.phases.length+'" style="max-width:45px">';
      h+='<label>'+(lang==='fi'?'Loppu':'To')+'</label><input class="input input-sm narrow" type="number" inputmode="numeric" value="'+(rp.repeatTo+1)+'" data-bind="repeatto" min="1" max="'+rp.phases.length+'" style="max-width:45px">';
      h+='<label>'+(lang==='fi'?'Kerrat':'Times')+'</label><input class="input input-sm narrow" type="number" inputmode="numeric" value="'+(rp.repeatCount||1)+'" data-bind="repeatcount" min="1" max="20" style="max-width:45px">';
      h+='</div></div>';
    }
    /* Cooldown */
    h+='<div class="card"><div class="label">'+(lang==='fi'?'J\u00e4\u00e4hdyttely':'Cooldown')+'</div>';
    h+='<div style="display:flex;gap:4px;align-items:center"><input class="input input-sm" value="'+esc(rp.cooldown.name||'')+'" data-bind="cooldownname" placeholder="'+(lang==='fi'?'Nimi':'Name')+'" style="flex:1"><label style="font-size:10px;color:var(--muted)">min</label><input class="input input-sm narrow" type="number" inputmode="numeric" value="'+((rp.cooldown.dur||0)/60||'')+'" data-bind="cooldownmin" placeholder="5" style="max-width:50px"></div></div>';
    /* Total time estimate */
    var tot=intervalTotalTime(rp);
    if(tot>0)h+='<div style="text-align:center;font-size:12px;color:var(--muted);margin:8px 0">'+(lang==='fi'?'Arvioitu kesto':'Estimated duration')+': '+fD(tot*1000)+'</div>';
  }
  h+='<div style="height:30px"></div>';app.innerHTML=h;}

function renderRunPrep(app,btm){
  var prog=R.prog;if(!prog){view='runhome';render();return;}
  var h='<div class="hdr"><button class="hdr-back" data-action="runcancel">\u2190</button><div style="flex:1"><div class="hdr-title">'+T().runPrepTitle+'</div></div></div>';
  h+='<div style="text-align:center;margin:20px 0"><div style="font-size:40px">\u{1F3C3}</div><div style="font-family:Oswald,sans-serif;font-size:24px;font-weight:700;color:var(--text);margin-top:8px">'+esc(prog.name)+'</div>';
  if(prog.desc)h+='<div style="font-size:12px;color:var(--muted);margin-top:4px">'+esc(prog.desc)+'</div>';
  h+='</div>';
  if(gpsStatus==='ok')h+='<div class="gps-status ok"><span class="gps-dot ok"></span>'+T().runGpsOk+'</div>';
  else if(gpsStatus==='error')h+='<div class="gps-status error">'+T().runGpsError+'</div>';
  else h+='<div class="gps-status waiting"><span class="gps-dot wait"></span>'+T().runGpsWait+'</div>';
  if(prog.type==='cooper'){
    h+='<div class="card" style="text-align:center"><div class="label">Cooper</div><div style="font-family:Oswald,sans-serif;font-size:20px;color:var(--accent)">12:00</div>';
    if(prog.targetDistance>0){
      var tPace=1000/(prog.targetDistance/720)/60;
      h+='<div style="font-size:13px;color:var(--blue);margin-top:8px">'+T().paceTarget+' '+fDist(prog.targetDistance)+'</div>';
      h+='<div style="font-size:11px;color:var(--muted)">'+T().paceRequired+' '+fPace(tPace)+'/km</div>';
    }else{
      h+='<div style="font-size:11px;color:var(--muted)">'+(lang==='fi'?'Juokse mahdollisimman pitk\u00e4lle':'Run as far as possible')+'</div>';
    }
    h+='</div>';
  }else if(prog.type==='timed_distance'){
    var tPace2=prog.targetDistance>0&&prog.targetTime>0?1000/(prog.targetDistance/prog.targetTime)/60:0;
    h+='<div class="card" style="text-align:center"><div class="label">'+(lang==='fi'?'Matka + aika':'Distance + time')+'</div>';
    h+='<div style="font-family:Oswald,sans-serif;font-size:20px;color:var(--blue)">'+fDist(prog.targetDistance)+' / '+fD(prog.targetTime*1000)+'</div>';
    if(tPace2>0)h+='<div style="font-size:11px;color:var(--muted);margin-top:4px">'+T().paceRequired+' '+fPace(tPace2)+'/km</div>';
    h+='</div>';
  }else if(prog.type==='interval'&&prog.phases&&prog.phases.length>0){
    h+='<div class="label" style="margin-top:12px">'+(lang==='fi'?'Vaiheet':'Phases')+'</div>';
    for(var pi=0;pi<prog.phases.length;pi++){var ph=prog.phases[pi];
      if(pi===(prog.repeatFrom||0)&&(prog.repeatCount||1)>1)h+='<div class="repeat-card"><div class="repeat-label">\u{1F501} '+T().runRepeat+' '+(prog.repeatCount||1)+'x</div>';
      h+='<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px"><span>'+esc(ph.name)+'</span><span style="color:var(--muted)">'+fD(ph.dur*1000)+(ph.pace?' \u00b7 '+fPace(ph.pace)+'/km':'')+'</span></div>';
      if(pi===(prog.repeatTo||0)&&(prog.repeatCount||1)>1)h+='</div>';
    }
    if(prog.cooldown&&prog.cooldown.dur>0)h+='<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px"><span>'+esc(prog.cooldown.name)+'</span><span style="color:var(--muted)">'+fD(prog.cooldown.dur*1000)+'</span></div>';
    var totalSec=intervalTotalTime(prog);
    h+='<div style="text-align:center;margin-top:8px;font-size:11px;color:var(--muted)">'+(lang==='fi'?'Kokonaisaika':'Total')+': ~'+fD(totalSec*1000)+'</div>';
  }else{
    var info='';if(prog.targetDistance)info=fDist(prog.targetDistance);else if(prog.targetTime)info=fD(prog.targetTime*1000);else info=lang==='fi'?'Vapaa':'Free';
    h+='<div class="card" style="text-align:center"><div style="font-family:Oswald,sans-serif;font-size:20px;color:var(--blue)">'+esc(info)+'</div></div>';
  }
  h+='<div style="height:120px"></div>';
  btm.style.display='flex';
  btm.innerHTML='<button class="btn danger" data-action="runcancel">'+(lang==='fi'?'Takaisin':'Back')+'</button><button class="btn primary" data-action="rungo"'+(gpsStatus==='error'?' disabled style="opacity:.4"':'')+'>'+( lang==='fi'?'Aloita':'Start')+' \u{1F525}</button>';
  app.innerHTML=h;
}

function renderRunActive(app,btm){
  btm.style.display='flex';
  var elMs=runElapsed(),elSec=Math.floor(elMs/1000),distM=R.distance,pace=runPaceMinKm(),prog=R.prog;
  var hasGPS=gpsBuf.length>=3;

  if(R.phase==='finished'){
    btm.style.display='none';
    var h='<div class="center"><div style="font-size:56px">\u{1F3C6}</div><div class="title">'+T().runFinish+'</div>';
    h+='<div class="stat-row"><div class="stat-card"><div class="stat-val" style="color:var(--blue)">'+fDist(distM)+'</div><div class="stat-label">'+T().uiDistance+'</div></div><div class="stat-card"><div class="stat-val">'+fD(elMs)+'</div><div class="stat-label">'+T().uiTime+'</div></div></div>';
    if(pace>0)h+='<div class="stat-row"><div class="stat-card"><div class="stat-val" style="font-size:20px">'+fPace(pace)+' /km</div><div class="stat-label">'+T().uiPaceLabel+'</div></div></div>';
    if(prog.type==='cooper'){var rating=cooperRating(Math.round(distM));h+='<div style="text-align:center;margin:12px 0;font-size:18px;font-family:Oswald,sans-serif;color:var(--green)">'+esc(rating)+'</div>';}
    h+='<button class="btn primary" data-action="runreset">'+T().uiBack+'</button></div>';
    app.innerHTML=h;return;}

  if(R.phase==='paused'){
    var hp='<div style="text-align:center;margin-top:30px"><div style="font-size:48px">\u23F8</div><div style="font-family:Oswald,sans-serif;font-size:36px;font-weight:700;color:var(--yellow);margin:16px 0;text-transform:uppercase;letter-spacing:3px">'+T().runPaused+'</div>';
    hp+='<div class="run-stats-row"><div class="run-stat-sm"><div class="run-stat-val" style="color:var(--blue)">'+fDist(distM)+'</div><div class="run-stat-label">'+T().uiDistance+'</div></div>';
    hp+='<div class="run-stat-sm"><div class="run-stat-val">'+fD(elMs)+'</div><div class="run-stat-label">'+T().uiElapsed+'</div></div></div></div>';
    app.innerHTML=hp;
    btm.innerHTML='<button class="btn danger" data-action="runstop">'+T().uiStop+'</button><button class="btn primary" data-action="runresume">'+T().uiResume+'</button>';return;}

  /* Active running view */
  var h2='';
  /* GPS indicator */
  var gpsAcc=gpsBuf.length>0?Math.round(gpsBuf[gpsBuf.length-1].acc):0;
  h2+='<div style="text-align:right;font-size:10px;color:var(--muted)"><span class="gps-dot '+(hasGPS?'ok':'wait')+'"></span>'+(hasGPS?'GPS \u00b1'+gpsAcc+'m':'GPS...')+'</div>';
  /* Program name + elapsed */
  h2+='<div style="text-align:center;font-size:11px;color:var(--muted);margin:4px 0">'+esc(prog.name)+' \u00b7 '+fD(elMs)+'</div>';

  /* Main distance display */
  h2+='<div class="run-stat"><div class="run-stat-val" style="font-size:72px;color:var(--blue)">'+fDist(distM)+'</div><div class="run-stat-label">'+T().uiDistance+'</div></div>';

  /* Progress bar for cooper/time/distance/timed_distance */
  if(prog.type==='cooper'){
    var pct=Math.min(elSec/720,1);
    h2+='<div class="cooper-bar"><div class="cooper-fill" style="width:'+(pct*100)+'%;background:linear-gradient(90deg,var(--accent),var(--green))"></div></div>';
    h2+='<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted)"><span>'+fD(elMs)+'</span><span>12:00</span></div>';
    if(prog.targetDistance>0){var pctTD=Math.min(distM/prog.targetDistance,1);
      h2+='<div class="cooper-bar"><div class="cooper-fill" style="width:'+(pctTD*100)+'%;background:var(--blue)"></div></div>';
      h2+='<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted)"><span>'+fDist(distM)+'</span><span>'+fDist(prog.targetDistance)+'</span></div>';
    }
  }else if(prog.type==='timed_distance'&&prog.targetTime>0&&prog.targetDistance>0){
    var pctTT=Math.min(elSec/prog.targetTime,1);
    h2+='<div class="cooper-bar"><div class="cooper-fill" style="width:'+(pctTT*100)+'%;background:linear-gradient(90deg,var(--accent),var(--yellow))"></div></div>';
    h2+='<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted)"><span>'+fD(elMs)+'</span><span>'+fD(prog.targetTime*1000)+'</span></div>';
    var pctTDD=Math.min(distM/prog.targetDistance,1);
    h2+='<div class="cooper-bar"><div class="cooper-fill" style="width:'+(pctTDD*100)+'%;background:var(--blue)"></div></div>';
    h2+='<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted)"><span>'+fDist(distM)+'</span><span>'+fDist(prog.targetDistance)+'</span></div>';
  }else if(prog.type==='time'&&prog.targetTime>0){
    var pctT=Math.min(elSec/prog.targetTime,1);
    h2+='<div class="cooper-bar"><div class="cooper-fill" style="width:'+(pctT*100)+'%;background:var(--blue)"></div></div>';
    h2+='<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted)"><span>'+fD(elMs)+'</span><span>'+fD(prog.targetTime*1000)+'</span></div>';
  }else if(prog.type==='distance'&&prog.targetDistance>0){
    var pctD=Math.min(distM/prog.targetDistance,1);
    h2+='<div class="cooper-bar"><div class="cooper-fill" style="width:'+(pctD*100)+'%;background:var(--green)"></div></div>';
    h2+='<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted)"><span>'+fDist(distM)+'</span><span>'+fDist(prog.targetDistance)+'</span></div>';
  }

  /* Interval phase display */
  if(prog.type==='interval'&&R.flatPhases.length>0){
    var cp=R.flatPhases[R.phaseIdx];
    h2+='<div class="run-phase-indicator">';
    for(var pi=0;pi<R.flatPhases.length;pi++){h2+='<div class="run-phase-dot '+(pi<R.phaseIdx?'done':pi===R.phaseIdx?'current':'')+'"></div>';}
    h2+='</div>';
    h2+='<div style="text-align:center;font-family:Oswald,sans-serif;font-size:22px;font-weight:700;color:'+(cp.type==='sprint'?'var(--accent)':cp.type==='tempo'?'var(--yellow)':'var(--green)')+';margin:4px 0">'+esc(cp.name)+'</div>';
    if(cp.round>0)h2+='<div style="text-align:center;font-size:10px;color:var(--muted)">'+T().runRepeat+' '+cp.round+'/'+(R.prog.repeatCount||1)+'</div>';
    h2+='<div style="text-align:center;font-family:Oswald,sans-serif;font-size:48px;font-weight:700;color:var(--text);margin:8px 0;font-variant-numeric:tabular-nums">'+fD(R.phaseTimeLeft*1000)+'</div>';
    if(cp.pace>0)h2+='<div class="target-pace-display">'+T().runTargetPace+': '+fPace(cp.pace)+'/km'+(pace>0?' \u00b7 '+(lang==='fi'?'Nyt':'Now')+': '+fPace(pace)+'/km':'')+'</div>';
    /* Progress bar for phase */
    var pctPh=1-R.phaseTimeLeft/cp.dur;
    h2+='<div class="cooper-bar"><div class="cooper-fill" style="width:'+(pctPh*100)+'%;background:'+(cp.type==='sprint'?'var(--accent)':cp.type==='tempo'?'var(--yellow)':'var(--green)')+'"></div></div>';
    h2+='<div style="font-size:10px;color:var(--muted);text-align:center">'+(R.phaseIdx+1)+'/'+R.flatPhases.length+'</div>';
  }

  /* Stats row */
  h2+='<div class="run-stats-row">';
  var rPace=recentPaceMinKm();
  var hasTargetUI=(prog.type==='cooper'&&prog.targetDistance>0)||(prog.type==='timed_distance'&&prog.targetDistance>0&&prog.targetTime>0);
  var reqPaceUI=0;
  if(hasTargetUI){var tT=prog.type==='cooper'?720:(prog.targetTime||999);var rT=Math.max(1,tT-elSec);var rD=prog.targetDistance-distM;if(rD>0&&rT>0)reqPaceUI=1000/(rD/rT)/60;}
  /* Pace color: green=on target, red=too slow, blue=too fast */
  var paceColor='var(--text)';
  if(hasTargetUI&&rPace>0&&reqPaceUI>0){
    if(rPace>reqPaceUI*1.05)paceColor='var(--accent)';
    else if(rPace<reqPaceUI*0.85)paceColor='var(--blue)';
    else paceColor='var(--green)';
  }
  h2+='<div class="run-stat-sm"><div class="run-stat-val" style="color:'+paceColor+'">'+(rPace>0?fPace(rPace):(pace>0?fPace(pace):'--:--'))+'</div><div class="run-stat-label">'+(rPace>0&&pace>0?(lang==='fi'?'nyt':'now')+' ('+fPace(pace)+' avg)':'/km')+'</div></div>';
  if(prog.type==='cooper'){
    var proj=Math.round(runProjectedCooper());
    h2+='<div class="run-stat-sm"><div class="run-stat-val" style="color:var(--green)">'+fDist(proj)+'</div><div class="run-stat-label">'+T().uiProjectedLabel+'</div></div>';
  }
  if(hasTargetUI&&reqPaceUI>0){
    h2+='<div class="run-stat-sm"><div class="run-stat-val" style="font-size:24px;color:var(--yellow)">'+fPace(reqPaceUI)+'</div><div class="run-stat-label">'+T().paceRequired+'</div></div>';
  }
  if(prog.type==='cooper'||prog.type==='time'||prog.type==='timed_distance'){
    var target2=prog.type==='cooper'?720:(prog.targetTime||0);
    var rem2=Math.max(0,target2-elSec);
    h2+='<div class="run-stat-sm"><div class="run-stat-val">'+fD(rem2*1000)+'</div><div class="run-stat-label">'+T().uiRemaining+'</div></div>';
  }
  h2+='</div>';

  app.innerHTML=h2;
  btm.innerHTML='<button class="btn danger" data-action="runstop">'+T().uiStop+'</button><button class="btn sm" data-action="runpause">'+T().uiPause+'</button><button class="btn sm" data-action="runlock" style="background:#222;border-color:#444;color:#888">\u{1F512}</button>';
}

view=mainMode==='gym'?'home':mainMode==='run'?'runhome':'choose';render();
})();
</script>
</body>
</html>
